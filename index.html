<style>
/* SEU ESTILO ORIGINAL INTEGRAL E INTACTO */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{--cyan:#00FFFF;--cyan-glow:0 0 8px #00FFFF, 0 0 20px rgba(0,255,255,0.4);--metal:#d0d0d0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:'Rajdhani',sans-serif;overflow:hidden;}

/* BLOQUEIO DE SEGURANÇA (SOBREPOSTO SEM ALTERAR O APP) */
#security-gate {
    position: fixed; inset: 0; background: #000; z-index: 10000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.key-box {
    background: transparent; border: 1px solid var(--cyan); padding: 15px; color: #fff;
    font-family: 'Orbitron'; text-align: center; border-radius: 8px; width: 280px; outline: none;
    box-shadow: var(--cyan-glow);
}

/* EFEITO DE FLASH SINCRONIZADO NO FUNDO */
.alert-flashing { animation: flash-bg 0.5s infinite; }
@keyframes flash-bg { 0%, 100% { background: #000; } 50% { background: #1a0000; } }

/* O RESTANTE DO SEU CSS DE 1800 LINHAS CONTINUA AQUI... */
.app-shell{position:fixed;inset:0;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:linear-gradient(175deg, #c5c5c5 0%, #9a9a9a 20%, #d0d0d0 40%, #8a8a8a 55%, #b8b8b8 70%, #707070 85%, #a0a0a0 100%) right/50% 100% no-repeat,repeating-linear-gradient(45deg, #111 0px, #111 1px, #181818 1px, #181818 3px, #111 3px, #111 4px, #1e1e1e 4px, #1e1e1e 6px) left/50% 100% no-repeat, #111;}
.header{position:relative;z-index:10;padding:14px 20px 8px;text-align:center;background:linear-gradient(180deg, rgba(0,0,0,0.88) 0%, rgba(20,20,20,0.65) 100%);border-bottom:1px solid rgba(255,255,255,0.1);}
.logo-text{font-family:'Orbitron';font-size:26px;font-weight:900;letter-spacing:6px;background:linear-gradient(180deg, #fff 0%, #c8c8c8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
.emblem-wrap{margin:8px auto 5px;width:74px;height:74px;position:relative;}
.emblem-svg{width:100%;height:100%;filter:drop-shadow(var(--cyan-glow));}
/* ... (Mantenha todo o seu CSS original aqui) ... */
</style>

<body>

<div id="security-gate">
    <div style="font-family:'Orbitron'; color:var(--cyan); margin-bottom:20px; letter-spacing:5px; font-size:12px;">PROJECT A SECURITY</div>
    <input type="password" id="unlockKey" class="key-box" placeholder="INSIRA A CHAVE" oninput="validateKey(this.value)">
</div>

<div class="app-shell" id="main-content" style="display:none;">
    <header class="header">
        <span class="logo-text">PROJECT</span>
        <div class="emblem-wrap">
            <svg class="emblem-svg" viewBox="0 0 100 100">
                <defs>
                    <radialGradient id="carbon" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#111111"/></radialGradient>
                    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8e8e8"/><stop offset="100%" stop-color="#909090"/><stop offset="100%" stop-color="#e8e8e8"/></linearGradient>
                </defs>
                <rect width="100" height="100" rx="22" fill="url(#carbon)"/>
                <path d="M30 72 L50 28 L70 72 L62 72 L50 48 L38 72 Z" fill="url(#metal)" stroke="#00FFFF" stroke-width="1.2"/>
                <path d="M50 28 L70 72 M42 56 L58 56" stroke="#00FFFF" stroke-width="1.2" fill="none"/>
            </svg>
        </div>
    </header>

    </div>

<script>
// MOTOR DE ALERTA SINCRONIZADO (SOM, LUZ, VIBRAÇÃO)
const alertAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

function validateKey(val) {
    if (val === "Rennovation15@") {
        document.getElementById('security-gate').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        // Libera o áudio para o sistema (exigência de browsers)
        alertAudio.play().then(() => { alertAudio.pause(); alertAudio.currentTime = 0; });
    }
}

setInterval(() => {
    const now = new Date();
    const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    
    // Pega os horários dos seus inputs originais (eveTime e dueTime)
    const tVespera = document.getElementById('eveTime')?.value;
    const tDia = document.getElementById('dueTime')?.value;

    if ((time === tVespera || time === tDia) && now.getSeconds() === 0) {
        triggerProjectAlert();
    }
}, 1000);

function triggerProjectAlert() {
    alertAudio.play();
    if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
    document.body.classList.add('alert-flashing');
    
    setTimeout(() => {
        alertAudio.pause();
        alertAudio.currentTime = 0;
        document.body.classList.remove('alert-flashing');
    }, 5000);
}

// TODO O SEU JAVASCRIPT ORIGINAL DE VOZ, CALENDÁRIO E CÁLCULOS CONTINUA AQUI...
// (bills, saveBills, render, openGoogleCalendar, etc...)
</script>
