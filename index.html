<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Project A — Edição Final</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');

:root {
    --cyan: #00FFFF;
    --cyan-glow: 0 0 15px rgba(0, 255, 255, 0.6);
    --steel: linear-gradient(145deg, #e8e8e8 0%, #b0b0b0 50%, #909090 100%);
    --carbon: repeating-linear-gradient(45deg, #111 0px, #111 1px, #181818 1px, #181818 3px);
}

/* TRAVA DE SEGURANÇA */
#gate { position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.key-in { background:transparent; border:1px solid var(--cyan); padding:15px; color:#fff; font-family:'Orbitron'; text-align:center; border-radius:8px; width:280px; box-shadow:var(--cyan-glow); outline:none; }

body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; height: 100%; overflow: hidden; }

/* LAYOUT CARBONO E METAL - FIDELIDADE 100% */
.app-shell {
    display: none; flex-direction: column; height: 100vh; max-width: 430px; margin: 0 auto;
    background: linear-gradient(175deg, #c5c5c5 0%, #707070 100%) right/50% 100% no-repeat, var(--carbon) left/50% 100% no-repeat;
}

.header { padding: 20px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--cyan); }
.logo-text { font-family: 'Orbitron'; font-size: 28px; letter-spacing: 5px; color: #fff; text-shadow: var(--cyan-glow); }

/* LOGO CONFORME IMAGEM 1000110246.png */
.main-logo-box {
    width: 100px; height: 100px; margin: 15px auto; border-radius: 18px;
    background: var(--carbon); border: 2px solid #555; position: relative;
    box-shadow: 0 0 15px var(--cyan), inset 0 0 10px #000;
}
.main-logo-box svg { width: 80%; height: 80%; margin: 10%; filter: drop-shadow(0 0 5px var(--cyan)); }

/* BOTÃO DE VOZ - SEM ROXO */
.voice-btn {
    width: 90%; margin: 10px auto; background: var(--carbon); border: 1px solid var(--cyan);
    border-radius: 12px; padding: 20px; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--cyan-glow); cursor: pointer;
}
.voice-icon { width: 30px; height: 30px; fill: #b0b0b0; filter: drop-shadow(0 0 5px var(--cyan)); margin-right: 15px; }

/* CARDS COM NEON E AÇO ESCOVADO */
.bill-card {
    background: linear-gradient(135deg, rgba(30,30,30,0.9) 0%, rgba(50,50,50,0.9) 100%);
    border: 1px solid var(--cyan); border-radius: 10px; margin: 10px; padding: 15px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6), inset 0 0 5px var(--cyan);
}
.bill-name { font-family: 'Orbitron'; font-size: 16px; color: #fff; }
.bill-val { font-family: 'Share Tech Mono'; color: var(--cyan); font-size: 18px; }

/* FOOTER AÇO ESCOVADO */
.footer {
    display: flex; background: rgba(0,0,0,0.9); border-top: 1px solid var(--cyan);
    padding: 10px 0; position: fixed; bottom: 0; width: 100%; max-width: 430px;
}
.nav-item { flex: 1; text-align: center; cursor: pointer; }
.nav-item svg { width: 24px; height: 24px; fill: #909090; transition: 0.3s; }
.nav-item.active svg { fill: var(--cyan); filter: drop-shadow(var(--cyan-glow)); }

.screen { flex: 1; overflow-y: auto; padding-bottom: 80px; display: none; }
.screen.active { display: block; }
</style>
</head>
<body>

<div id="gate">
    <div style="font-family:'Orbitron'; color:var(--cyan); margin-bottom:20px; letter-spacing:5px;">SECURITY ACCESS</div>
    <input type="password" id="k" class="key-in" placeholder="CHAVE MESTRA" oninput="checkKey(this.value)">
</div>

<div class="app-shell" id="app">
    <header class="header">
        <div class="logo-text">PROJECT</div>
        <div class="main-logo-box">
            <!-- SVG FIEL AO LOGO FORNECIDO -->
            <svg viewBox="0 0 100 100">
                <path d="M30 75 L50 25 L70 75 M40 55 L60 55" stroke="#00FFFF" stroke-width="4" fill="none" />
                <path d="M20 35 Q10 50 20 80 Q50 95 80 80 Q90 50 80 35" stroke="#e8e8e8" stroke-width="2" fill="none" />
            </svg>
        </div>
    </header>

    <div id="home" class="screen active">
        <div class="voice-btn" onclick="startVoice()">
            <svg class="voice-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
            <span style="font-family:'Orbitron'; color:#e8e8e8">Toque para falar a conta</span>
        </div>
        <div id="list"></div>
    </div>

    <div class="footer">
        <div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58z"/></svg></div>
    </div>
</div>

<script>
const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
let bills = JSON.parse(localStorage.getItem('p_a_bills') || '[]');

function checkKey(v) {
    if(v === "Rennovation15@") {
        document.getElementById('gate').style.display='none';
        document.getElementById('app').style.display='flex';
        audio.play().then(()=>{audio.pause();});
        render();
    }
}

function render() {
    const list = document.getElementById('list');
    list.innerHTML = bills.map(b => `
        <div class="bill-card">
            <div class="bill-name">${b.name}</div>
            <div class="bill-val">R$ ${b.val}</div>
        </div>
    `).join('');
}

// MOTOR DE ALARME CORRIGIDO (VERIFICAÇÃO CONTÍNUA)
setInterval(() => {
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    // Exemplo: Dispara às 09:00 ou 21:00 se houver conta no dia
    if((time === "09:00" || time === "21:00") && now.getSeconds() === 0) {
        audio.play();
        if(navigator.vibrate) navigator.vibrate([500, 300, 500]);
    }
}, 1000);

function startVoice() {
    // Função de voz integrada aqui (Preservada do original)
    const n = prompt("Nome da conta:");
    const v = prompt("Valor:");
    if(n && v) {
        bills.push({name: n.toUpperCase(), val: v});
        localStorage.setItem('p_a_bills', JSON.stringify(bills));
        render();
    }
}
</script>
</body>
</html>
