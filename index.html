<style>
/* 100% DO SEU CSS ORIGINAL - SEM ALTERAÇÕES */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{--cyan:#00FFFF;--cyan-glow:0 0 8px #00FFFF, 0 0 20px rgba(0,255,255,0.4);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

/* ESTILO DA TRAVA DE SEGURANÇA */
#security-lock {
    position: fixed; inset: 0; background: #000; z-index: 10000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.key-input {
    background: transparent; border: 1px solid var(--cyan); padding: 15px; color: #fff;
    font-family: 'Orbitron'; text-align: center; border-radius: 8px; width: 280px; outline: none;
    box-shadow: var(--cyan-glow);
}

/* O SEU LAYOUT DE LUXO COMEÇA AQUI - INTACTO */
.app-shell{position:fixed;inset:0;display:none;flex-direction:column;max-width:430px;margin:0 auto;background:linear-gradient(175deg, #c5c5c5 0%, #9a9a9a 20%, #d0d0d0 40%, #8a8a8a 55%, #b8b8b8 70%, #707070 85%, #a0a0a0 100%) right/50% 100% no-repeat,repeating-linear-gradient(45deg, #111 0px, #111 1px, #181818 1px, #181818 3px, #111 3px, #111 4px, #1e1e1e 4px, #1e1e1e 6px) left/50% 100% no-repeat, #111;}
.header{position:relative;z-index:10;padding:14px 20px 8px;text-align:center;background:linear-gradient(180deg, rgba(0,0,0,0.88) 0%, rgba(20,20,20,0.65) 100%);border-bottom:1px solid rgba(255,255,255,0.1);}
.logo-text{font-family:'Orbitron';font-size:26px;font-weight:900;letter-spacing:6px;background:linear-gradient(180deg, #fff 0%, #c8c8c8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
.emblem-wrap{margin:8px auto 5px;width:74px;height:74px;position:relative;}
.emblem-svg{width:100%;height:100%;filter:drop-shadow(var(--cyan-glow)); transition: filter 0.3s;}

/* ... AQUI CONTINUA TODO O RESTO DO SEU CSS DE 1800 LINHAS ... */
/* (Mantenha o restante do seu CSS original aqui) */

<body>

<div id="security-lock">
    <div style="font-family:'Orbitron'; color:var(--cyan); margin-bottom:20px; letter-spacing:5px;">PROJECT A</div>
    <input type="password" id="passkey" class="key-input" placeholder="CHAVE MESTRA" oninput="unlockApp(this.value)">
</div>

<div class="app-shell" id="app-body">
    <header class="header">
        <span class="logo-text">PROJECT</span>
        <div class="emblem-wrap">
            <svg class="emblem-svg" id="main-logo" viewBox="0 0 100 100">
                <defs>
                    <radialGradient id="f" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#111111"/></radialGradient>
                    <linearGradient id="m" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d0d0d0"/><stop offset="50%" stop-color="#909090"/><stop offset="100%" stop-color="#e8e8e8"/></linearGradient>
                </defs>
                <rect width="100" height="100" rx="22" fill="url(#f)"/>
                <path d="M30 72 L50 28 L70 72 L62 72 L50 48 L38 72 Z" fill="url(#m)" stroke="#00FFFF" stroke-width="1.2"/>
                <path d="M50 28 L70 72 M42 56 L58 56" stroke="#00FFFF" stroke-width="1.2" fill="none"/>
            </svg>
        </div>
    </header>

    </div>

<script>
/* MOTOR DE ALERTA E SEGURANÇA */
const alertSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

function unlockApp(val) {
    if (val === "Rennovation15@") {
        document.getElementById('security-lock').style.display = 'none';
        document.getElementById('app-body').style.display = 'flex';
        // Desbloqueia o som para o sistema
        alertSnd.play().then(() => { alertSnd.pause(); alertSnd.currentTime = 0; });
    }
}

// O MOTOR QUE VOCÊ PEDIU: SOM, LUZ E VIBRAÇÃO
setInterval(() => {
    const agora = new Date();
    const horaAtual = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
    
    // Conecta com seus inputs de configuração (eveTime e dueTime)
    const tVespera = document.getElementById('eveTime')?.value;
    const tDia = document.getElementById('dueTime')?.value;

    if ((horaAtual === tVespera || horaAtual === tDia) && agora.getSeconds() === 0) {
        alertSnd.play();
        if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
        
        // Efeito visual no seu logotipo
        const logo = document.getElementById('main-logo');
        if(logo) {
            logo.style.filter = "drop-shadow(0 0 30px #00FFFF)";
            setTimeout(() => logo.style.filter = "drop-shadow(var(--cyan-glow))", 5000);
        }
    }
}, 1000);

/* AQUI EMBAIXO VOCÊ COLA TODO O SEU JAVASCRIPT ORIGINAL */
/* (Aquela parte imensa que cuida da voz, do calendário e das contas) */
</script>
</body>
