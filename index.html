<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PROJECT A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<meta name="description" content="Organize, acompanhe e pague em dia.">
<link id="pwaManifest" rel="manifest">
<link id="appleTouchIcon" rel="apple-touch-icon">
<title>PROJECT A — Finance Management</title>
<script>
// ══════════════════════════════════════════════
// SISTEMA ANTI-COMPARTILHAMENTO
// ══════════════════════════════════════════════
(function() {
  // CHAVE ATUAL - MUDE ESTE NÚMERO PARA CADA NOVO USUÁRIO
  // Exemplo: para enviar para João use 1851, para Maria use 0914, etc.
  const CHAVE_ATUAL = '1851';  // ← ALTERE AQUI PARA CADA NOVO LINK!
  
  // Pega a chave do link (ex: site.com/?v=1851)
  const params = new URLSearchParams(window.location.search);
  const chaveDigitada = params.get('v');
  
  // Verifica se o usuário já foi autorizado antes
  const usuarioAutorizado = localStorage.getItem('projectA_autenticado');
  const chaveSalva = localStorage.getItem('projectA_chave');
  
  // Caso 1: Usuário já tem chave salva (já acessou antes)
  if (usuarioAutorizado === 'true' && chaveSalva === CHAVE_ATUAL) {
    document.documentElement.style.display = 'block';
    return;
  }
  
  // Caso 2: Digitou a chave correta no link
  if (chaveDigitada === CHAVE_ATUAL) {
    // Salva que este usuário está autorizado com esta chave
    localStorage.setItem('projectA_autenticado', 'true');
    localStorage.setItem('projectA_chave', CHAVE_ATUAL);
    document.documentElement.style.display = 'block';
    return;
  }
  
  // Caso 3: Tentativa de acesso sem chave ou com chave errada
  document.documentElement.style.display = 'block';
  document.documentElement.innerHTML = `
    <body style="background:#000; color:#00FFFF; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; margin:0; padding:20px;">
      <div style="text-align:center; border:2px solid #00FFFF; padding:40px; border-radius:10px; max-width:90%;">
        <h1>🔒 ACESSO RESTRITO</h1>
        <p>Este link é pessoal e intransferível.</p>
        <p style="font-size:12px; margin-top:20px;">Entre em contato com o administrador<br>para receber seu link de acesso.</p>
        <hr style="border-color:#333; margin:20px 0;">
        <p style="font-size:11px; color:#666;">Chave necessária para acesso</p>
      </div>
    </body>`;
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --cyan: #00FFFF;
  --cyan-glow: 0 0 8px #00FFFF, 0 0 20px rgba(0,255,255,0.4);
  --chrome-mid: #b0b0b0;
  --green-ok: #00e676;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  font-family:'Rajdhani', sans-serif;
  background:#000; overflow:hidden;
  user-select:none; -webkit-user-select:none;
}

/* ═══════════════════════════════
   SPLIT BACKGROUND
═══════════════════════════════ */
.app-shell {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  max-width:430px; margin:0 auto;
  background:
    linear-gradient(175deg,#c5c5c5 0%,#9a9a9a 20%,#d0d0d0 40%,#8a8a8a 55%,#b8b8b8 70%,#707070 85%,#a0a0a0 100%) right/50% 100% no-repeat,
    repeating-linear-gradient(45deg,#111 0px,#111 1px,#181818 1px,#181818 3px,#111 3px,#111 4px,#1e1e1e 4px,#1e1e1e 6px) left/50% 100% no-repeat,
    #111;
  overflow:hidden;
}
.app-shell::before {
  content:''; position:absolute; inset:0; right:50%; z-index:0;
  background:
    repeating-linear-gradient(-45deg,transparent 0,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px),
    repeating-linear-gradient(45deg,transparent 0,transparent 2px,rgba(0,0,0,.3) 2px,rgba(0,0,0,.3) 4px);
  pointer-events:none;
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.header {
  position:relative; z-index:10;
  padding:14px 20px 8px; text-align:center;
  background:linear-gradient(180deg,rgba(0,0,0,.88) 0%,rgba(20,20,20,.65) 100%);
  border-bottom:1px solid rgba(255,255,255,.1);
  flex-shrink:0;
}
.logo-text {
  font-family:'Orbitron',sans-serif; font-size:26px; font-weight:900; letter-spacing:6px;
  background:linear-gradient(180deg,#fff 0%,#c8c8c8 30%,#f0f0f0 50%,#909090 70%,#d0d0d0 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.9));
}
.logo-sub { font-size:10px; letter-spacing:5px; color:var(--chrome-mid); margin-top:-2px; }
.emblem-wrap { margin:8px auto 5px; width:74px; height:74px; }
.emblem-svg { width:100%; height:100%; filter:drop-shadow(0 4px 12px rgba(0,0,0,.8)); }
.tagline { font-size:11px; letter-spacing:2.5px; color:#aaa; text-transform:uppercase; margin-bottom:2px; }

/* ═══════════════════════════════
   SPA SCREENS
═══════════════════════════════ */
.screen {
  flex:1; overflow-y:auto; overflow-x:hidden;
  position:relative; z-index:5;
  padding:10px 12px 8px;
  -webkit-overflow-scrolling:touch;
  display:none;
}
.screen.active { display:block; }
.screen::-webkit-scrollbar { width:3px; }
.screen::-webkit-scrollbar-track { background:rgba(255,255,255,.05); }
.screen::-webkit-scrollbar-thumb { background:rgba(0,255,255,.3); border-radius:2px; }

/* ═══════════════════════════════
   ADD BUTTON
═══════════════════════════════ */
.add-btn {
  width:100%;
  background:repeating-linear-gradient(45deg,#111 0,#111 2px,#191919 2px,#191919 4px);
  border:1px solid rgba(255,255,255,.15); border-radius:14px;
  padding:14px 20px; cursor:pointer; text-align:center; margin-bottom:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.5),0 6px 20px rgba(0,0,0,.6);
  position:relative; overflow:hidden; transition:transform .1s,box-shadow .1s;
}
.add-btn::before {
  content:''; position:absolute; top:0; left:0; right:0; height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 100%);
  border-radius:14px 14px 0 0;
}
.add-btn:active { transform:scale(.98); }
.add-btn-icon { display:block; line-height:1; }
.add-btn-label { font-size:20px; font-weight:600; color:#e0e0e0; letter-spacing:1px; display:block; margin-top:4px; }
.add-btn-sub   { font-size:12px; color:#888; letter-spacing:1px; display:block; margin-top:2px; }

/* ═══════════════════════════════
   SECTION LABELS
═══════════════════════════════ */
.section-label {
  font-size:11px; font-weight:700; letter-spacing:3px; color:#999; text-transform:uppercase;
  margin:4px 0 8px 2px; padding-bottom:4px; border-bottom:1px solid rgba(255,255,255,.08);
}
.page-header {
  font-family:'Orbitron',sans-serif; font-size:13px; color:var(--cyan);
  text-shadow:var(--cyan-glow); letter-spacing:2px; margin-bottom:14px;
  padding-bottom:8px; border-bottom:1px solid rgba(0,255,255,.15);
}

/* ═══════════════════════════════
   BILL CARDS (Home)
═══════════════════════════════ */
.bill-card {
  width:100%;
  background:linear-gradient(135deg,rgba(40,40,40,.95) 0%,rgba(55,55,55,.9) 30%,rgba(35,35,35,.95) 60%,rgba(50,50,50,.9) 100%);
  border:1px solid rgba(255,255,255,.12); border-top:1px solid rgba(255,255,255,.22);
  border-radius:10px; margin-bottom:7px;
  display:flex; align-items:center; padding:10px 12px;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 -1px 0 rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.7);
  position:relative; overflow:hidden; transition:transform .15s;
}
.bill-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:45%;
  background:linear-gradient(180deg,rgba(255,255,255,.07) 0%,transparent 100%);
  border-radius:10px 10px 0 0; pointer-events:none;
}
.bill-card:active { transform:scale(.98); }

.bill-icon {
  width:38px; height:38px; flex-shrink:0;
  background:linear-gradient(135deg,#555 0%,#888 40%,#444 70%,#666 100%);
  border:1px solid rgba(255,255,255,.15); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 3px 8px rgba(0,0,0,.6);
  margin-right:12px;
}
.bill-icon svg { width:20px; height:20px; }
.bill-info { flex:1; min-width:0; }
.bill-name {
  font-size:16px; font-weight:600; color:#e8e8e8; letter-spacing:.5px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition:filter .3s;
}
.bill-date  { font-size:11px; color:#777; letter-spacing:.5px; margin-top:1px; }
.bill-amount {
  font-family:'Share Tech Mono',monospace; font-size:15px;
  color:var(--cyan); text-shadow:var(--cyan-glow);
  font-weight:700; white-space:nowrap; margin-left:8px; transition:filter .3s;
}
.bill-name.blurred   { filter:blur(12px); }
.bill-amount.blurred { filter:blur(12px); }

.bill-card.paid {
  background:linear-gradient(135deg,rgba(25,40,25,.95) 0%,rgba(35,50,35,.9) 50%,rgba(25,35,25,.95) 100%);
}
.bill-card.paid .bill-name   { color:#aaa; }
.bill-card.paid .bill-amount { color:rgba(0,200,200,.4); text-shadow:none; text-decoration:line-through; }
.bill-card.paid .bill-name.blurred   { filter:blur(12px); }
.bill-card.paid .bill-amount.blurred { filter:blur(12px); }

.paid-check {
  width:28px; height:28px; flex-shrink:0;
  background:radial-gradient(circle,#004d00 0%,#001a00 100%);
  border:1.5px solid #00c853; border-radius:50%;
  display:flex; align-items:center; justify-content:center; margin-right:10px;
  box-shadow:0 0 8px rgba(0,200,83,.4),inset 0 1px 0 rgba(255,255,255,.1);
}
.pay-btn {
  background:linear-gradient(135deg,#1a3a1a 0%,#2a5a2a 50%,#1a3a1a 100%);
  border:1px solid #00c853; border-radius:6px; color:#00e676;
  font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:700;
  letter-spacing:1px; padding:4px 10px; cursor:pointer; margin-left:8px;
  box-shadow:0 0 6px rgba(0,200,83,.2); white-space:nowrap; transition:box-shadow .2s;
}
.pay-btn:active { box-shadow:0 0 14px rgba(0,200,83,.5); }

/* Alert banner */
.alert-card {
  width:100%;
  background:linear-gradient(135deg,rgba(30,25,15,.95) 0%,rgba(45,35,15,.9) 50%,rgba(30,25,10,.95) 100%);
  border:1px solid rgba(255,200,50,.2); border-top:1px solid rgba(255,220,80,.3);
  border-radius:10px; display:flex; align-items:center;
  padding:10px 12px; margin-top:6px; margin-bottom:10px; box-shadow:0 4px 14px rgba(0,0,0,.6);
}
.alert-icon {
  width:38px; height:38px; flex-shrink:0; margin-right:12px;
  background:linear-gradient(135deg,#3a2a00 0%,#5a4000 50%,#3a2a00 100%);
  border:1px solid rgba(255,200,50,.3); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
}
.alert-text .alert-title { font-size:13px; font-weight:700; color:#ffc107; letter-spacing:1px; }
.alert-text .alert-sub   { font-size:11px; color:#888; margin-top:1px; }

/* Empty state */
.empty-state { text-align:center; padding:22px; color:#444; font-size:13px; letter-spacing:1px; }

/* ═══════════════════════════════
   SCREEN 1 — PAGAMENTOS
═══════════════════════════════ */
.filter-row { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.filter-btn {
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
  border-radius:6px; color:#777; font-family:'Rajdhani',sans-serif;
  font-size:11px; font-weight:700; letter-spacing:1px; padding:4px 14px;
  cursor:pointer; transition:all .15s;
}
.filter-btn.active {
  background:rgba(0,50,60,.8); border-color:rgba(0,255,255,.3);
  color:var(--cyan); text-shadow:var(--cyan-glow);
}

.pag-row {
  display:flex; align-items:center;
  background:linear-gradient(135deg,rgba(38,38,38,.95) 0%,rgba(50,50,50,.9) 50%,rgba(38,38,38,.95) 100%);
  border:1px solid rgba(255,255,255,.1); border-top:1px solid rgba(255,255,255,.18);
  border-radius:9px; padding:10px 12px; margin-bottom:6px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 3px 10px rgba(0,0,0,.6);
}
.pag-dot {
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0; margin-right:10px;
}
.pag-info  { flex:1; min-width:0; }
.pag-name  { font-size:15px; font-weight:600; color:#ddd; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pag-date  { font-size:10px; color:#666; letter-spacing:.5px; margin-top:1px; }
.pag-amt   { font-family:'Share Tech Mono',monospace; font-size:14px; color:var(--cyan); text-shadow:var(--cyan-glow); white-space:nowrap; margin-left:8px; }
.pag-badge {
  font-size:9px; font-weight:700; letter-spacing:1px;
  padding:2px 7px; border-radius:4px; margin-left:8px; white-space:nowrap;
}
.badge-pending { background:rgba(255,160,0,.15); color:#ffa000; border:1px solid rgba(255,160,0,.3); }
.badge-paid    { background:rgba(0,200,83,.12); color:#00e676; border:1px solid rgba(0,200,83,.25); }
.badge-overdue { background:rgba(255,50,50,.15); color:#ff5252; border:1px solid rgba(255,50,50,.3); }

/* ═══════════════════════════════
   SCREEN 2 — CALENDÁRIO
═══════════════════════════════ */
.cal-nav {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
}
.cal-month-title {
  font-family:'Orbitron',sans-serif; font-size:13px;
  color:var(--cyan); text-shadow:var(--cyan-glow); letter-spacing:2px;
}
.cal-nav-btn {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
  border-radius:6px; color:#aaa; padding:4px 14px; cursor:pointer; font-size:18px;
  transition:background .15s;
}
.cal-nav-btn:active { background:rgba(255,255,255,.12); }

.cal-dow-row {
  display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px;
}
.cal-dow {
  text-align:center; font-size:9px; font-weight:700;
  letter-spacing:1px; color:#555; padding:4px 0; text-transform:uppercase;
}
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:14px; }
.cal-cell {
  aspect-ratio:1; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:600; color:#444;
  position:relative; background:transparent;
}
.cal-cell.today {
  background:rgba(255,255,255,.08); color:#ccc;
  border:1px solid rgba(255,255,255,.15);
}
.cal-cell.has-bill {
  background:rgba(0,50,60,.75); color:var(--cyan);
  border:1px solid rgba(0,255,255,.25);
  box-shadow:0 0 8px rgba(0,255,255,.15);
}
.cal-cell.overdue-day {
  background:rgba(60,0,0,.7); color:#ff5252;
  border:1px solid rgba(255,50,50,.3);
}
.cal-cell .cal-dot {
  position:absolute; bottom:3px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%;
  background:var(--cyan); box-shadow:0 0 4px var(--cyan);
}
.cal-event-row {
  display:flex; align-items:center; padding:9px 12px; margin-bottom:5px;
  background:linear-gradient(135deg,rgba(35,35,35,.95) 0%,rgba(48,48,48,.9) 100%);
  border:1px solid rgba(255,255,255,.09); border-radius:8px;
}
.cal-event-day {
  font-family:'Share Tech Mono',monospace; font-size:22px; font-weight:700;
  color:var(--cyan); text-shadow:var(--cyan-glow);
  width:36px; flex-shrink:0; text-align:center;
}
.cal-event-day.past { color:#ff5252; text-shadow:0 0 8px #ff5252; }
.cal-event-info { flex:1; margin-left:10px; }
.cal-event-name   { font-size:14px; font-weight:600; color:#ddd; }
.cal-event-amount { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--cyan); margin-top:1px; }

/* ═══════════════════════════════
   SCREEN 3 — RESUMO FINANCEIRO
═══════════════════════════════ */
.summary-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;
}
.summary-card {
  background:linear-gradient(135deg,rgba(38,38,38,.95) 0%,rgba(52,52,52,.9) 100%);
  border:1px solid rgba(255,255,255,.1); border-top:1px solid rgba(255,255,255,.2);
  border-radius:10px; padding:14px 12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 4px 12px rgba(0,0,0,.6);
  position:relative; overflow:hidden;
}
.summary-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 100%);
  border-radius:10px 10px 0 0;
}
.s-label { font-size:9px; font-weight:700; letter-spacing:2px; color:#555; text-transform:uppercase; margin-bottom:6px; }
.s-value { font-family:'Share Tech Mono',monospace; font-size:17px; font-weight:700; color:var(--cyan); text-shadow:var(--cyan-glow); }
.s-value.green { color:#00e676; text-shadow:0 0 8px rgba(0,230,118,.4); }
.s-value.red   { color:#ff5252; text-shadow:0 0 8px rgba(255,82,82,.4); }
.s-sub  { font-size:10px; color:#555; margin-top:3px; letter-spacing:.5px; }

.bar-wrap { margin-bottom:12px; }
.bar-lbl  { display:flex; justify-content:space-between; font-size:11px; color:#777; letter-spacing:1px; margin-bottom:5px; }
.bar-track {
  height:8px; background:rgba(255,255,255,.06); border-radius:4px;
  overflow:hidden; border:1px solid rgba(255,255,255,.08);
}
.bar-fill {
  height:100%; border-radius:4px;
  background:linear-gradient(90deg,var(--cyan),rgba(0,200,200,.6));
  box-shadow:0 0 8px rgba(0,255,255,.3); transition:width .8s cubic-bezier(.16,1,.3,1);
}
.bar-fill.red {
  background:linear-gradient(90deg,#ff5252,rgba(200,50,50,.6));
  box-shadow:0 0 8px rgba(255,82,82,.3);
}

.cat-row {
  display:flex; align-items:center; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.cat-row:last-child { border-bottom:none; }
.cat-dot  { width:8px; height:8px; border-radius:50%; margin-right:10px; flex-shrink:0; }
.cat-name { flex:1; font-size:13px; color:#bbb; letter-spacing:.5px; }
.cat-cnt  { font-size:11px; color:#555; margin-right:12px; }
.cat-tot  { font-family:'Share Tech Mono',monospace; font-size:13px; color:var(--cyan); }

/* ═══════════════════════════════
   SCREEN 4 — CONFIGURAÇÕES
═══════════════════════════════ */
.cfg-section { margin-bottom:18px; }
.cfg-section-title {
  font-size:9px; font-weight:700; letter-spacing:3px; color:#555; text-transform:uppercase;
  margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid rgba(255,255,255,.06);
}
.cfg-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 14px; margin-bottom:5px;
  background:linear-gradient(135deg,rgba(35,35,35,.95) 0%,rgba(48,48,48,.9) 100%);
  border:1px solid rgba(255,255,255,.09); border-top:1px solid rgba(255,255,255,.15);
  border-radius:9px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 3px 10px rgba(0,0,0,.5);
}
.cfg-label { font-size:14px; font-weight:600; color:#ccc; letter-spacing:.5px; }
.cfg-sub   { font-size:10px; color:#555; margin-top:1px; letter-spacing:.5px; }

.toggle {
  width:44px; height:24px; border-radius:12px; cursor:pointer;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.12);
  position:relative; transition:background .3s; flex-shrink:0;
}
.toggle.on { background:rgba(0,100,120,.8); border-color:rgba(0,255,255,.3); box-shadow:0 0 8px rgba(0,255,255,.2); }
.toggle-thumb {
  position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
  background:linear-gradient(135deg,#888,#ccc); transition:left .3s,background .3s;
  box-shadow:0 2px 4px rgba(0,0,0,.5);
}
.toggle.on .toggle-thumb { left:22px; background:linear-gradient(135deg,var(--cyan),#00aaaa); }

.cfg-btn {
  padding:5px 14px;
  background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 100%);
  border:1px solid rgba(255,255,255,.15); border-radius:7px;
