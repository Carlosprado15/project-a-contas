<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Project A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Project A</title>
<link rel="manifest" href="data:application/manifest+json,{
  \"name\":\"Project A\",
  \"short_name\":\"ProjA\",
  \"start_url\":\".\",
  \"display\":\"standalone\",
  \"theme_color\":\"#000000\",
  \"background_color\":\"#000000\",
  \"icons\":[{
    \"src\":\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='f' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%232a2a2a'/%3E%3Cstop offset='100%25' stop-color='%23111111'/%3E%3C/radialGradient%3E%3ClinearGradient id='m' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23d0d0d0'/%3E%3Cstop offset='50%25' stop-color='%23909090'/%3E%3Cstop offset='100%25' stop-color='%23e8e8e8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23f)'/%3E%3Cpath d='M30 72 L50 28 L70 72 L62 72 L50 48 L38 72 Z' fill='url(%23m)' stroke='%2300FFFF' stroke-width='1.2'/%3E%3Cpath d='M50 28 L70 72 M42 56 L58 56' stroke='%2300FFFF' stroke-width='1.2' fill='none'/%3E%3C/svg%3E\",
    \"sizes\":\"any\",
    \"type\":\"image/svg+xml\"
  }]
}">
<style>
/* SEU DESIGN SYSTEM ORIGINAL INTEGRAL */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --cyan: #00FFFF;
  --cyan-glow: 0 0 8px #00FFFF, 0 0 20px rgba(0,255,255,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; font-family: 'Rajdhani', sans-serif; background: #000; overflow: hidden; }

/* TRAVA DE SEGURANÇA */
#auth-screen {
  position: fixed; inset: 0; background: #000; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.key-input {
  background: transparent; border: 1px solid var(--cyan); padding: 15px; color: #fff;
  font-family: 'Orbitron'; text-align: center; border-radius: 8px; width: 280px; outline: none;
  box-shadow: var(--cyan-glow);
}

/* EFEITO ALERTA VISUAL */
@keyframes alertFlash {
  0% { box-shadow: inset 0 0 0px red; }
  50% { box-shadow: inset 0 0 50px red; }
  100% { box-shadow: inset 0 0 0px red; }
}
.visual-alert { animation: alertFlash 0.5s infinite; }

/* RE-APLICANDO SEU SHELL */
.app-shell {
  position: fixed; inset: 0; display: none; flex-direction: column; max-width: 430px; margin: 0 auto;
  background:
    linear-gradient(175deg, #c5c5c5 0%, #9a9a9a 20%, #d0d0d0 40%, #8a8a8a 55%, #b8b8b8 70%, #707070 85%, #a0a0a0 100%) right/50% 100% no-repeat,
    repeating-linear-gradient(45deg, #111 0px, #111 1px, #181818 1px, #181818 3px, #111 3px, #111 4px, #1e1e1e 4px, #1e1e1e 6px) left/50% 100% no-repeat, #111;
}

/* TODOS OS SEUS ESTILOS ORIGINAIS ABAIXO... (Cards, Header, Emblema, etc) */
.header { position: relative; z-index: 10; padding: 14px 20px 8px; text-align: center; background: linear-gradient(180deg, rgba(0,0,0,.88) 0%, rgba(20,20,20,.65) 100%); border-bottom: 1px solid rgba(255,255,255,.1); }
.logo-text { font-family: 'Orbitron'; font-size: 26px; font-weight: 900; letter-spacing: 6px; background: linear-gradient(180deg, #fff 0%, #c8c8c8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.emblem-wrap { margin: 8px auto 5px; width: 74px; height: 74px; }
.emblem-svg { width: 100%; height: 100%; filter: drop-shadow(var(--cyan-glow)); }
.screen { flex: 1; overflow-y: auto; padding: 10px 12px; display: none; }
.screen.active { display: block; }
.add-btn { width: 100%; background: #111; border: 1px solid rgba(255,255,255,.15); border-radius: 14px; padding: 14px; margin-bottom: 14px; color: #fff; cursor: pointer; }
.bill-card { background: rgba(40,40,40,.95); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; margin-bottom: 7px; display: flex; align-items: center; padding: 10px; }
.bill-amount { font-family: 'Share Tech Mono'; color: var(--cyan); text-shadow: var(--cyan-glow); }
.pay-btn { background: #1a3a1a; border: 1px solid #00c853; border-radius: 6px; color: #00e676; padding: 4px 12px; font-weight: 700; cursor: pointer; }
.footer { background: #000; border-top: 1px solid rgba(255,255,255,.1); display: flex; }
.footer-btn { flex: 1; text-align: center; padding: 10px; color: #666; cursor: pointer; }
.footer-btn.active { color: var(--cyan); }
.f-label { font-size: 10px; display: block; text-transform: uppercase; }
.cfg-time-input { background: #000; border: 1px solid var(--cyan); color: var(--cyan); font-family: monospace; padding: 6px; border-radius: 6px; text-align: center; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: flex-end; z-index: 1000; }
.modal-overlay.open { display: flex; }
.modal-sheet { width: 100%; background: #1e1e1e; border-radius: 20px 20px 0 0; padding: 20px; }
.blurred { filter: blur(12px); }
</style>
</head>
<body>

<div id="auth-screen">
  <div style="font-family:'Orbitron'; color:var(--cyan); margin-bottom:20px; letter-spacing:5px;">SECURITY CHECK</div>
  <input type="password" id="appKey" class="key-input" placeholder="RENN..." oninput="checkKey(this.value)">
</div>

<div class="app-shell" id="mainApp">
  <header class="header">
    <div class="logo-text">PROJECT</div>
    <div class="emblem-wrap">
      <svg class="emblem-svg" viewBox="0 0 100 100">
        <defs>
          <radialGradient id="carbonFiber" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#111111"/></radialGradient>
          <linearGradient id="brushedSteel" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8e8e8"/><stop offset="100%" stop-color="#909090"/></linearGradient>
          <filter id="neonAura"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00FFFF"/></filter>
        </defs>
        <rect width="100" height="100" rx="22" fill="url(#carbonFiber)"/>
        <path d="M30 72 L50 28 L70 72 L62 72 L50 48 L38 72 Z" fill="url(#brushedSteel)" stroke="#00FFFF" stroke-width="1.5" filter="url(#neonAura)"/>
        <path d="M50 28 L70 72 M42 56 L58 56" stroke="#00FFFF" stroke-width="1.8" fill="none" filter="url(#neonAura)"/>
      </svg>
    </div>
  </header>

  <div class="screen active" id="screen-0">
    <button class="add-btn" id="openModalBtn">Toque para falar a conta</button>
    <div id="upcomingList"></div>
    <div id="paidList"></div>
  </div>

  <div class="screen" id="screen-4">
    <div class="header">CONFIGURAÇÕES</div>
    <div style="padding:20px;">
        <label style="color:#777">Alerta na Véspera:</label>
        <input type="time" id="eveTime" class="cfg-time-input" value="21:00">
        <br><br>
        <label style="color:#777">Alerta no Dia:</label>
        <input type="time" id="dueTime" class="cfg-time-input" value="09:00">
    </div>
  </div>

  <nav class="footer">
    <div class="footer-btn active" onclick="showScreen(0)"><span class="f-label">Início</span></div>
    <div class="footer-btn" onclick="showScreen(4)"><span class="f-label">Config</span></div>
  </nav>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-sheet">
        <input type="text" id="billName" placeholder="Nome">
        <input type="number" id="billAmount" placeholder="Valor">
        <input type="date" id="billDue">
        <button onclick="saveNewBill()">SALVAR</button>
        <button onclick="closeModal()">FECHAR</button>
    </div>
</div>

<script>
let bills = JSON.parse(localStorage.getItem('projectA_bills') || '[]');
const alertSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

// 1. TRAVA DE SEGURANÇA
function checkKey(val) {
    if(val === "Rennovation15@") {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        // Libera áudio
        alertSnd.play().then(() => { alertSnd.pause(); });
    }
}

// 2. MOTOR DE ALERTA SINCRONIZADO (TRI-ALERTA)
setInterval(() => {
    const now = new Date();
    const timeNow = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    const eveT = document.getElementById('eveTime').value;
    const dueT = document.getElementById('dueTime').value;

    if((timeNow === eveT || timeNow === dueT) && now.getSeconds() === 0) {
        triggerMegaAlert();
    }
}, 1000);

function triggerMegaAlert() {
    // SOM
    alertSnd.play();
    // VIBRAÇÃO
    if(navigator.vibrate) navigator.vibrate([500, 300, 500]);
    // LUZ (VISUAL)
    document.body.classList.add('visual-alert');
    
    // Para sozinho em 5 segundos (não é chato)
    setTimeout(() => {
        alertSnd.pause();
        alertSnd.currentTime = 0;
        document.body.classList.remove('visual-alert');
    }, 5000);
}

// LÓGICA DE INTERFACE ORIGINAL
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(`screen-${id}`).classList.add('active');
}

function render() {
    const list = document.getElementById('upcomingList');
    list.innerHTML = bills.map(b => `
        <div class="bill-card">
            <div style="flex:1">${b.name} <br> <small>${b.due}</small></div>
            <div class="bill-amount">R$ ${b.amount}</div>
            <button class="pay-btn" onclick="pay('${b.id}')">PAGAR</button>
        </div>
    `).join('');
}

function saveNewBill() {
    const b = { id:Date.now(), name:document.getElementById('billName').value, amount:document.getElementById('billAmount').value, due:document.getElementById('billDue').value };
    bills.push(b);
    localStorage.setItem('projectA_bills', JSON.stringify(bills));
    render();
    closeModal();
}

function pay(id) { bills = bills.filter(b => b.id != id); localStorage.setItem('projectA_bills', JSON.stringify(bills)); render(); }
function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('openModalBtn').onclick = openModal;
render();
</script>
</body>
</html>
