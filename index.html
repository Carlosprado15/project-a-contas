<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PROJECT</title>
    
    <!-- Fontes Tech -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --metal-dark: #1a1a1a;
            --carbon: #0d0d0d;
            --gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }

        /* TELA DE BLOQUEIO */
        #lock-screen {
            position: fixed;
            inset: 0;
            background: var(--carbon);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .lock-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 10px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 30px;
        }

        .key-input {
            background: transparent;
            border: 1px solid var(--neon-blue);
            padding: 15px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            border-radius: 5px;
            width: 80%;
            max-width: 300px;
            outline: none;
        }

        /* CONTEÚDO PRINCIPAL */
        #app-content {
            display: none;
            padding: 20px;
            animation: fadeIn 1s ease;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        /* LOGOTIPO "A" ESTILIZADO */
        .logo-a {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #222, #000);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            box-shadow: 0 0 15px var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--neon-blue);
            position: relative;
        }

        .logo-a::after {
            content: '';
            position: absolute;
            inset: -5px;
            border: 1px solid var(--neon-blue);
            opacity: 0.3;
            border-radius: 18px;
        }

        /* DASHBOARD CARDS */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,242,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        /* EFEITO DE ALERTA VISUAL (LUZ) */
        @keyframes flashAlert {
            0% { background: #000; }
            50% { background: #ff000033; }
            100% { background: #000; }
        }

        .alert-active {
            animation: flashAlert 0.5s infinite;
        }

        input[type="time"] {
            background: #222;
            border: none;
            color: var(--neon-blue);
            padding: 8px;
            border-radius: 5px;
            font-family: 'Orbitron';
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Bloqueio por Chave -->
    <div id="lock-screen">
        <div class="lock-logo">PROJECT</div>
        <input type="password" id="key" class="key-input" placeholder="DIGITE A CHAVE" oninput="verifyKey(this.value)">
    </div>

    <!-- Interface Principal -->
    <div id="app-content">
        <header>
            <h1>PROJECT</h1>
            <div class="logo-a">A</div>
        </header>

        <section class="card">
            <h3><span id="current-date">--/--/----</span></h3>
            <p style="color: var(--neon-blue); font-size: 1.2rem;" id="current-time">00:00:00</p>
        </section>

        <section class="card">
            <h4 style="margin-bottom: 15px;">CONFIGURAÇÃO DE ALERTAS</h4>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Horário do Alarme:</span>
                <input type="time" id="alarmTime" value="08:00">
            </div>
        </section>

        <div id="log" style="font-size: 0.8rem; opacity: 0.5; padding: 10px;">Sistema pronto.</div>
    </div>

    <script>
        // SEGURANÇA
        function verifyKey(val) {
            if (val === "Rennovation15@") {
                document.getElementById('lock-screen').style.transform = 'translateY(-100%)';
                document.getElementById('app-content').style.display = 'block';
                unlockAudio();
            }
        }

        // RELÓGIO
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('pt-br');
            document.getElementById('current-date').innerText = now.toLocaleDateString('pt-br');
            checkAlarm(now);
        }, 1000);

        // MOTOR DE ALERTA (SOM, LUZ, VIBRAÇÃO)
        let isAlerting = false;
        const alertAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function unlockAudio() {
            alertAudio.play().then(() => {
                alertAudio.pause();
                alertAudio.currentTime = 0;
            }).catch(() => {});
        }

        function checkAlarm(now) {
            const setTime = document.getElementById('alarmTime').value;
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + 
                              now.getMinutes().toString().padStart(2, '0');

            if (currentTime === setTime && !isAlerting && now.getSeconds() < 2) {
                triggerTripleAlert();
            }
        }

        function triggerTripleAlert() {
            isAlerting = true;
            
            // 1. SOM (Auto-limitado em 5 segundos)
            alertAudio.volume = 1.0;
            alertAudio.play();
            
            // 2. LUZ (Efeito Visual)
            document.body.classList.add('alert-active');
            
            // 3. VIBRAÇÃO
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 500]);
            }

            // Para tudo após 5 segundos automaticamente (Não incomoda)
            setTimeout(() => {
                alertAudio.pause();
                alertAudio.currentTime = 0;
                document.body.classList.remove('alert-active');
                isAlerting = false;
            }, 5000);
        }

        // PWA - ÍCONE DE ATALHO (Configuração interna para o celular)
        if ('serviceWorker' in navigator) {
            const manifest = {
                "name": "PROJECT A",
                "short_name": "PROJECT A",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#000000",
                "theme_color": "#00f2ff",
                "icons": [{
                    "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='black'/><rect width='90' height='90' x='5' y='5' rx='18' fill='none' stroke='%2300f2ff' stroke-width='2'/><text x='50' y='65' font-family='Orbitron' font-size='50' fill='%2300f2ff' text-anchor='middle'>A</text></svg>",
                    "sizes": "192x192",
                    "type": "image/png"
                }]
            };
            const stringManifest = JSON.stringify(manifest);
            const blob = new Blob([stringManifest], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            const linkTag = document.createElement('link');
            linkTag.rel = 'manifest';
            linkTag.href = manifestURL;
            document.head.appendChild(linkTag);
        }
    </script>
</body>
</html>
